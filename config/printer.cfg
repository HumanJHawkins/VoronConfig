gcode:
    {% set b = params.BED|default(50)|int %}
    {% set e = params.EXTRUDER|default(150)|int %}
    PRINT_START BED={b} EXTRUDER={e} TEST_ONLY=1
    PRINT_END TEST_ONLY=1

[gcode_macro COUNTDOWN_CLOCK]
description: Start a countdown. Usage: COUNTDOWN_CLOCK SECONDS=300 LABEL="Heat Soak"
variable_remaining: 0
variable_label: "Waiting"
variable_callback: ""
gcode:
    {% set seconds = params.SECONDS|default(300)|int %}
    {% set label = params.LABEL|default("Waiting")|string %}
    {% set callback = params.CALLBACK|default("")|string %}
    
    # Store state in the macro variables
    SET_GCODE_VARIABLE MACRO=COUNTDOWN_CLOCK VARIABLE=remaining VALUE={seconds}
    SET_GCODE_VARIABLE MACRO=COUNTDOWN_CLOCK VARIABLE=label VALUE='"{label}"'
    SET_GCODE_VARIABLE MACRO=COUNTDOWN_CLOCK VARIABLE=callback VALUE='"{callback}"'
    UPDATE_DELAYED_GCODE ID=_COUNTDOWN_TICK DURATION=1

[delayed_gcode _COUNTDOWN_TICK]
gcode:
    {% set p = printer["gcode_macro COUNTDOWN_CLOCK"] %}
    {% set remaining = p.remaining %}
    {% set label = p.label %}

    {% if remaining > 0 %}
        {% set mins = (remaining / 60)|int %}
        {% set secs = (remaining % 60)|int %}
        
        # Correct Klipper string formatting syntax:
        SET_DISPLAY_TEXT MSG="{label}: { '%02d:%02d' | format(mins, secs) }"
        
        # Decrement and reschedule
        SET_GCODE_VARIABLE MACRO=COUNTDOWN_CLOCK VARIABLE=remaining VALUE={remaining - 1}
        UPDATE_DELAYED_GCODE ID=_COUNTDOWN_TICK DURATION=1
    {% else %}
        SET_DISPLAY_TEXT MSG="{p.label}: Complete!"
        # Callback to resume after actual time passed
        {% if p.callback != "" %}
            {p.callback}
        {% endif %}
    {% endif %}

[gcode_macro PRINT_START]
variable_target_bed_temp: 0
variable_target_extruder_temp: 0
variable_target_chamber_temp: 0
variable_is_test: 0
gcode:
    {% set p = printer["gcode_macro GLOBALS"] %}

    # 1. Pull parameters into local variables for clean use in THIS macro
    {% set bed = params.BED|default(50)|int %}
    {% set extruder = params.EXTRUDER|default(220)|int %}
    {% set chamber = params.CHAMBER|default(0)|int %}
    {% set test = params.TEST_ONLY|default(0)|int %}

    # 2. Save to persistent variables for use in PART 2
    SET_GCODE_VARIABLE MACRO=PRINT_START VARIABLE=target_bed_temp VALUE={bed}
    SET_GCODE_VARIABLE MACRO=PRINT_START VARIABLE=target_extruder_temp VALUE={extruder}
    SET_GCODE_VARIABLE MACRO=PRINT_START VARIABLE=target_chamber_temp VALUE={chamber}
    SET_GCODE_VARIABLE MACRO=PRINT_START VARIABLE=is_test VALUE={test}

    # --- Start heating without blocking, as soon as possible. ---
    SET_SKEW CLEAR=1
    
    SET_DISPLAY_TEXT MSG="Initial homing and pre-heat"
    M104 S150               
    M140 S{bed}    
    G90
    M83
    CENTER  # Includes homing if needed. Center for heat soak, warming Cartographer
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={chamber}   
    
    {% if test != 1 %}
        SET_DISPLAY_TEXT MSG="2 Minute Heat Soak"
        # Here we went down a dee prabbi hole, trying to make a countdowen timer... It's 
        #   been coded just fine and dandy in several different ways that should just work. 
        #   But Klipper utterly fails to do even the most basic of ordered logic that 
        #   involves timers or callbacks.
        #
        # If you want to spend another 6 to 8 hours of frustration, Look at the countdown 
        #   clock and countdown tick macros, and split the PRINT_START macro in two so you 
        #   can use callbacks, etc. Then come to your senses, delete it all, and get back 
        #   to 3D printing.
        G4 P120000  # Do not use S120. Currently, klipper wait is non-blocking when seconds are used.
    {% endif %}
       
    # --- Calibration ---
    SET_DISPLAY_TEXT MSG="Quad Gantry Level"
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=150
    QUAD_GANTRY_LEVEL      

    SET_DISPLAY_TEXT MSG="Re-home after QGL"
    G28 

    SKEW_PROFILE LOAD=Califlower

    SET_DISPLAY_TEXT MSG="Bed Mesh"
    BED_MESH_CALIBRATE ADAPTIVE=1

    # --- Final Heat & Purge ---
    SET_DISPLAY_TEXT MSG="Heating Hotend: {extruder}C"
    G1 X{p.center_x} Y{p.center_y} Z15 F{p.travel_speed}
    M109 S{extruder}

    SET_DISPLAY_TEXT MSG="Purging and Wiping..."
    G90
    G0 Z0.4
    G92 E0
    M83
    
    # Purge
    G0 X125 Y{p.purge_y} Z20 F{p.travel_speed}        # Move to front-left corner of the bed at Z=27
    G1 X150 Y{p.purge_y} Z2 E5 F1000                  # Move right while lowering Z and priming the nozzle
    G1 X180 Y{p.purge_y} Z0.5 E15 F1000               # Extrude 20mm of filament while moving right and low
    G1 X200 Y{p.purge_y} Z0.1 E5 F1000                # Basically Wipe the nozzle on the bed.
    G0 Z2.0 F6000
    G0 X225 Y{p.purge_y} Z2 F18000

    G92 E0
    G90

    SET_DISPLAY_TEXT MSG="Printing..."

[gcode_macro PRINT_END]
gcode:
    {% set p = printer["gcode_macro GLOBALS"] %}
    {% set is_test = params.TEST_ONLY|default(0)|int %}
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 20, th.axis_maximum.z]|min %}
        
    M400                           
    G92 E0                         
    
    # Only retract if this wasn't a dry run
    {% if is_test == 0 %}
        G1 E-5.0 F3600             
    {% endif %}
    
    TURN_OFF_HEATERS
    M107                           
    
    G90                                         
    G0 Z{z_safe} F3000                  
    G0 X{x_safe} Y{y_safe} F{p.travel_speed}               
    G0 X{th.axis_maximum.x / 2} Y{th.axis_maximum.y - 5} F24000 
    
    BED_MESH_CLEAR  
    SET_SKEW CLEAR=1
  
    {% if is_test != 1 %}
      SET_DISPLAY_TEXT MSG="Print Complete."
    {% else %} 
      CENTER
      SET_DISPLAY_TEXT MSG="Function test complete."           
    {% endif %}
      
[gcode_macro PID_TUNE_ALL]
