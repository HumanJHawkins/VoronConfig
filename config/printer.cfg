[gcode_macro DRIVER_BURN_IN]
description: Starts a thermal stress test using delayed gcode for real-time tracking.
variable_iterations: 0
variable_current_loop: 0
variable_speed: 0
variable_start_time: 0
gcode:
    {% set iterations = params.ITERATIONS|default(100)|int %}
    {% set speed = params.SPEED|default(1000)|int %}
    
    # Initialize variables for the run
    SET_GCODE_VARIABLE MACRO=DRIVER_BURN_IN VARIABLE=iterations VALUE={iterations}
    SET_GCODE_VARIABLE MACRO=DRIVER_BURN_IN VARIABLE=current_loop VALUE=1
    SET_GCODE_VARIABLE MACRO=DRIVER_BURN_IN VARIABLE=speed VALUE={speed}
    SET_GCODE_VARIABLE MACRO=DRIVER_BURN_IN VARIABLE=start_time VALUE={printer.toolhead.estimated_print_time}
    
    {% if "xyz" not in printer.toolhead.homed_axes %} G28 {% endif %}
    G90
    SET_DISPLAY_TEXT MSG="Starting Burn-in..."
    
    # Begin iteration loop
    UPDATE_DELAYED_GCODE ID=_BURN_IN_ITERATION DURATION=0.1

[delayed_gcode _BURN_IN_ITERATION]
gcode:
    {% set macro = printer["gcode_macro DRIVER_BURN_IN"] %}
    {% set i = macro.current_loop %}
    {% set iterations = macro.iterations %}
    {% set speed = macro.speed %}
    {% set start_time = macro.start_time %}
    
    # 1. Fix Timing: Use estimated_print_time for "Wall Clock" accuracy
    {% set current_time = printer.toolhead.estimated_print_time %}
    {% set elapsed = current_time - start_time %}
    
    # 2. Fix Driver Data: Access via the specific object name
    {% set tmc_x = printer["tmc2209 stepper_x"] %}
    
    {% set status_msg = "Loop %d/%d | Elapsed: %.1fs | CS: %s | OTPW: %s" % (
        i, iterations, elapsed, tmc_x.cs_actual, tmc_x.otpw) %}
    
    SET_DISPLAY_TEXT MSG="{status_msg}"

    # 3. Movement
    {% set x_min, x_max = 75, 275 %}
    {% set y_min, y_max = 42, 242 %}
    G0 X{x_min} Y{y_min} Z10 F{speed * 60}
    G1 X{x_max} Y{y_max} F{speed * 60}
    G1 X{x_min} Y{y_min} F{speed * 60}
    G0 X{x_max} Y{y_min} F{speed * 60} 
    G1 X{x_min} Y{y_max} F{speed * 60}
    G1 X{x_max} Y{y_min} F{speed * 60}
    G0 X{x_min} Y{y_min} F{speed * 60}

    # 4. Queue or Finish
    {% if i < iterations %}
        SET_GCODE_VARIABLE MACRO=DRIVER_BURN_IN VARIABLE=current_loop VALUE={i + 1}
        UPDATE_DELAYED_GCODE ID=_BURN_IN_ITERATION DURATION=0.1
    {% else %}
        M400 # Wait for physical finish
        {% set final_time = printer.toolhead.estimated_print_time %}
        {% set final_elapsed = final_time - start_time %}
        G0 X175 Y175 Z1 F{speed * 60}
        SET_DISPLAY_TEXT MSG="Success | Final Time: {'%.1f' % final_elapsed}s"
    {% endif %}
    
[gcode_macro PRINT_FUNCTION_TEST]
