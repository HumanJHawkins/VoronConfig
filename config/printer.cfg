[gcode_macro SPEED_DEMO]
description: High-speed stress test with various geometric shapes.
gcode:
    # --- Parameters ---
    {% set p = printer["gcode_macro GLOBALS"] %}
    {% set speed = params.SPEED|default(400)|int %}         # mm/s
    {% set accel = params.ACCEL|default(5000)|int %}        # mm/s^2
    {% set f_speed = speed * 60 %}                           # Convert to mm/min
    
    # --- Bounds Calculation (150mm square centered at 175, 175) ---
    {% set x_min, x_max = 100, 250 %}
    {% set y_min, y_max = 100, 250 %}
    {% set x_mid, y_mid = 175, 175 %}
    {% set r = 75 %} # Radius for the polygons and circle

    # --- Setup ---
    {% if "xyz" not in printer.toolhead.homed_axes %} G28 {% endif %}
    SET_VELOCITY_LIMIT ACCEL={accel}
    G90
    G0 X{x_mid} Y{y_mid} Z10 F{p.travel_speed}
    
    SET_DISPLAY_TEXT MSG="Starting Speed Demo: {speed}mm/s @ {accel}accel"

    # --- 1. Front to Back (Center line) ---
    G0 X{x_mid} Y{y_min} F{f_speed}
    G1 Y{y_max} F{f_speed}

    # --- 2. Triangle (Back corners to front middle) ---
    G1 X{x_min} Y{y_max} F{f_speed}
    G1 X{x_max} Y{y_max} F{f_speed}
    G1 X{x_mid} Y{y_min} F{f_speed}

    # --- 3. Square ---
    G1 X{x_min} Y{y_min} F{f_speed}
    G1 X{x_min} Y{y_max} F{f_speed}
    G1 X{x_max} Y{y_max} F{f_speed}
    G1 X{x_max} Y{y_min} F{f_speed}
    G1 X{x_min} Y{y_min} F{f_speed}

    # --- 4. Pentagon ---
    G1 X103.7 Y151.9 F{f_speed}
    G1 X131.1 Y236.2 F{f_speed}
    G1 X218.9 Y236.2 F{f_speed}
    G1 X246.3 Y151.9 F{f_speed}
    G1 X175.0 Y100.0 F{f_speed}

    # --- 5. Hexagon ---
    G1 X110.1 Y137.5 F{f_speed}
    G1 X110.1 Y212.5 F{f_speed}
    G1 X175.0 Y250.0 F{f_speed}
    G1 X239.9 Y212.5 F{f_speed}
    G1 X239.9 Y137.5 F{f_speed}
    G1 X175.0 Y100.0 F{f_speed}

    # --- 6. Circles (2x G2, 2x G3) ---
    # Move to starting point (Right middle)
    G0 X250 Y175 F{f_speed}
    # Two clockwise circles
    G2 X100 Y175 I-75 J0 F{f_speed}
    G2 X250 Y175 I75 J0 F{f_speed}
    G2 X100 Y175 I-75 J0 F{f_speed}
    G2 X250 Y175 I75 J0 F{f_speed}
    # Two counter-clockwise circles
    G3 X100 Y175 I-75 J0 F{f_speed}
    G3 X250 Y175 I75 J0 F{f_speed}
    G3 X100 Y175 I-75 J0 F{f_speed}
    G3 X250 Y175 I75 J0 F{f_speed}

    # --- 7. Reverse (Hexagon back to Center) ---
    G1 X239.9 Y137.5 F{f_speed}
    G1 X239.9 Y212.5 F{f_speed}
    G1 X175.0 Y250.0 F{f_speed}
    G1 X110.1 Y212.5 F{f_speed}
    G1 X110.1 Y137.5 F{f_speed}
    G1 X175.0 Y100.0 F{f_speed}

    # Return to Center
    G0 X{x_mid} Y{y_mid} F{p.travel_speed}
    SET_DISPLAY_TEXT MSG="Speed Demo Complete"

#*# <---------------------- SAVE_CONFIG ---------------------->
