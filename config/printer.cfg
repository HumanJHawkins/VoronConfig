#####################################################################
#   Header & Scope
#####################################################################
[include mainsail.cfg]
[include shell_command.cfg]


[respond] # Required to allow console output

#####################################################################
#   Infrastructure
#####################################################################
[mcu] # Manta M8P v2.0
canbus_uuid: d5a13834b5d7

[mcu EBBCan] # FYSETC H36 Combo v1.3
canbus_uuid: 2b64583c63d7

[mcu cartographer]
canbus_uuid: 87969b84d36d

[printer]
kinematics: corexy
max_velocity: 600           # Temp reduced due to low torque on A/B. Test actual max when fixed.
max_accel: 5000             # Temp reduced due to low torque on A/B. Recalibrate Input Shaper when fixed. 
minimum_cruise_ratio: 0.5   # smooth accel/decel changes.
max_z_velocity: 40
max_z_accel: 400
square_corner_velocity: 5.0

[heater_bed]
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PB1
max_power: 1.0
min_temp: 0
max_temp: 122
#control: pid
#pid_kp: 58.747            # Add this placeholder
#pid_ki: 2.560             # Add this placeholder
#pid_kd: 377.058           # Add this placeholder


#####################################################################
#   Motion System (Gantry) - LDO 2804 & Sensorless Setup
#####################################################################
[force_move]
enable_force_move: True

[skew_correction]

## X Stepper on Motor1 (B Motor rear left)
[stepper_x]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 64
rotation_distance: 40
full_steps_per_rotation: 200    # for 1.8 degree steps
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0
position_max: 352.1
position_endstop: 352
homing_speed: 80            # 80 is fast for sensorless homing, but works well
homing_retract_dist: 0      # Requires 0 for sensorless homing
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PE3
interpolate: False
run_current: 1.4            # 2.0 actually tested well, though I don't believe the tests.             
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PF3              # Physical jumper on Motor 2 DIAG header
driver_SGTHRS: 20           # at 0.7A homing_speed 80, 95 triggered early. 90 worked. 50 worked well too.
driver_TBL: 1               # Timing optimization for 2804 low inductance
driver_TOFF: 3              # Timing optimization for 2804 low inductance
driver_HSTRT: 0
driver_HEND: 2

## Y Stepper on Motor2 (A Motor rear right)
[stepper_y]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 64
rotation_distance: 40
full_steps_per_rotation: 200     # for 1.8 degree steps
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: -4.1
position_max: 355.1
position_endstop: 355
homing_speed: 80            # 80 is fast for sensorless homing, but works well
homing_retract_dist: 0      # Requires 0 for sensorless homing
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PC13
interpolate: False
run_current: 1.4            # Match stepper_x
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PF4
driver_SGTHRS: 20           # at 0.7A homing_speed 80, 75 triggered early. 70 worked. 30 worked well too.
driver_TBL: 1               # Match stepper_x
driver_TOFF: 3              # Match stepper_x
driver_HSTRT: 0
driver_HEND: 2

## Z0 Stepper - Front Left on MOTOR3
[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
microsteps: 32
rotation_distance: 40
gear_ratio: 80:16
endstop_pin: probe:z_virtual_endstop
position_min: -2.0
position_max: 330
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PB9
interpolate: True
run_current: 1.0
sense_resistor: 0.110
stealthchop_threshold: 0

#  Z1 Stepper - Rear Left on Motor4
[stepper_z1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PB5
interpolate: True
run_current: 1.0
sense_resistor: 0.110
stealthchop_threshold: 0

## Z2 Stepper - Rear Right on Motor5
[stepper_z2]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PG14
interpolate: True
run_current: 1.0
sense_resistor: 0.110
stealthchop_threshold: 0

## Z3 Stepper - Front Right on Motor6
[stepper_z3]
step_pin: PG9
dir_pin: !PD7
enable_pin: !PG11
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PG10
interpolate: True
run_current: 1.0
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
#   Toolhead (FYSETC H36 Combo v1.3)
#####################################################################
[extruder]
step_pin: EBBCan:PB9
dir_pin: !EBBCan:PB8
enable_pin: !EBBCan:PB7
microsteps: 16
rotation_distance: 4.7521   # Orbiter 2.5 baseline 4.637 * 0.96
# gear_ratio: 7.5:1         # Remove. Built into rotation distance.
nozzle_diameter: 0.500
filament_diameter: 1.750
heater_pin: EBBCan:PA7
sensor_type: PT1000
sensor_pin: EBBCan:PA6
pullup_resistor: 2200
min_temp: 0
max_temp: 350
pressure_advance: 0.02        # Reset for new hardware
max_extrude_only_distance: 1001.0
max_extrude_only_velocity: 60.0
max_extrude_cross_section: 50.0
#control: pid
#pid_kp: 28.372
#pid_ki: 7.566
#pid_kd: 26.598

[tmc2209 extruder]
uart_pin: EBBCan:PC14
run_current: 0.70         # LDO Orbiter 2.5 motor spec
stealthchop_threshold: 0   # Torque mode (SpreadCycle)
interpolate: False         # Best for extruder precision
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4             # Cooling optimization

[multi_pin part_cooling_fan_pins]
pins: EBBCan:PA5, EBBCan:PB15

[fan]
pin: multi_pin:part_cooling_fan_pins
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5

[heater_fan hotend_fan]
pin: EBBCan:PA9
heater: extruder
heater_temp: 50.0
kick_start_time: 0.5

[filament_switch_sensor runout_sensor]
pause_on_runout: True
switch_pin: ^EBBCan:PA15 # The '^' enables the internal pull-up resistor
runout_gcode:
    M117 Filament Runout Detected
insert_gcode:
    M117 Filament Inserted

[gcode_button orbiter_sensor_button]
pin: ^EBBCan:PC7
press_gcode:
  {% if printer.print_stats.state == "printing" %}
    # Start a 2-second countdown. If still pressed after 2s, it's a real tangle.
    UPDATE_DELAYED_GCODE ID=_VERIFY_ORBITER_TANGLE DURATION=2
  {% else %}
    M117 Unloading...
    UNLOAD_FILAMENT
  {% endif %}
release_gcode:
  # Crucial: If the tension is released, stop the countdown immediately.
  # This "clears" the false positive.
  UPDATE_DELAYED_GCODE ID=_VERIFY_ORBITER_TANGLE DURATION=0

[delayed_gcode _VERIFY_ORBITER_TANGLE]
gcode:
  # This only runs if the button stayed 'pressed' for the full duration.
  {% if printer["gcode_button orbiter_sensor_button"].state == "pressed" %}
    {action_respond_info("Orbiter Sensor: Tangle confirmed (Held >2s). Pausing.")}
    M117 TANGLE DETECTED!
    PAUSE
  {% endif %}

[cartographer]
mcu: cartographer
x_offset: 0
y_offset: 33 

[cartographer touch]
UNSAFE_max_touch_temperature: 155  # Allows the 152C overshoot without canceling
# samples: 3                         # Number of touches to average
# max_samples: 10                    # Stop trying after this many fails
# speed: 2                           # Probing speed for the touch
# lift_speed: 5                      # Speed to lift after touching

[cartographer scan]
# mesh_runs: 2              # Does two passes (one each way) to account for tilt/slop
# mesh_speed: 100           # How fast it moves across the bed while scanning
# mesh_height: 3            # The Z height it maintains during the scan
# mesh_direction: x         # Scans primarily along the X axis
# mesh_path: snake        # Movement pattern (snake is standard)

[cartographer coil]
# name: cartographer_coil   # The name you can use for graphs/displays
# min_temp: 0               # Minimum operating temp
# max_temp: 105             # Shut down if the probe itself gets too hot (from bed/chamber)


[neopixel toolhead_led]
pin: EBBCan:PB0
chain_count: 1
color_order: GRB
initial_RED: 0.1
initial_GREEN: 0.0
initial_BLUE: 0.1


#####################################################################
#   Thermal & Environmental
#####################################################################
# Main Electronics Cooling (Duct over drivers)
[controller_fan driver_fan]
pin: PF9                    # Fan1 port (VF1 / PF9)
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5
fan_speed: 1.0
idle_timeout: 60            # Keep running for 1 min after motors disable
idle_speed: 0.4             # Keep air moving at 40% when idle
stepper: stepper_x, stepper_y, stepper_z, stepper_z1, stepper_z2, stepper_z3
# Logic: This fan will run whenever any of these steppers are active.

[temperature_sensor chamber]
sensor_type: PT1000
sensor_pin: PB0
pullup_resistor: 2200    # 4700 for PT100 (no jumper) or 2200 for PT1000 (jumper on Manta M8P)
min_temp: 0
max_temp: 100
gcode_id: C

# MCU & Pi Cooling (General airflow)
[temperature_fan electronics_fan]
pin: PF6
sensor_type: temperature_mcu
max_power: 1.0
min_temp: 0
max_temp: 85
target_temp: 40.0           # The "middle" goal temperature
control: pid
pid_kp: 2.0                 # Proportional: How aggressively it reacts
pid_ki: 5.0                 # Integral: How it corrects long-term drift
pid_kd: 0.5                 # Derivative: Smooths out sudden changes
pid_deriv_time: 2.0
min_speed: 0.15             # The "Slow" speed (15%) to maintain silent airflow
max_speed: 1.0              # The "Full" speed (100%)
off_below: 0.10             # Shut off entirely if the math calls for < 10%

# Bed Auxiliary Fan (Under-bed)
[heater_fan bed_under_fan]
pin: PA6
heater: heater_bed
heater_temp: 50.0
fan_speed: 1.0

# [heater_fan fan_side_heater]
# pin: PA6
# tachometer_pin: PC2
# heater: heater_bed
# heater_temp: 50.0
# fan_speed: 1.0

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[temperature_sensor pi_CM4]
sensor_type: temperature_host


#####################################################################
#   Calibration & Probing
#####################################################################
[quad_gantry_level]
gantry_corners:
    -60,-10
    410,420
# Points are pulled 25mm from the edges to ensure accurate induction readings
points:
    15,-4
    15,300
    335,300
    335,-4
speed: 800
horizontal_move_z: 10
retries: 10
retry_tolerance: 0.01
max_adjust: 15

[bed_mesh]
speed: 800
horizontal_move_z: 3
mesh_min: 10, 29
mesh_max: 340, 340
probe_count: 60,60
algorithm: bicubic
zero_reference_position: 175, 175 # Physical center of 350mm bed
adaptive_margin: 25
mesh_pps: 0, 0                   # Recommended for dense scans

[homing_override]
axes: xyz
gcode:
  SAVE_GCODE_STATE NAME=homing_override_state
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}
  G90
  # SET_VELOCITY_LIMIT ACCEL=2000   # For X and Y, possibly temporary.
  
  # Home X
  {% if home_all or 'X' in params %}
    {% if 'y' in printer.toolhead.homed_axes %}
      G0 Y175 F48000
    {% endif %}
    _HOME_X
  {% endif %}

  # Home Y
  {% if home_all or 'Y' in params %}
    # X homed status will not be updated yet. So look at home_all too.
    {% if home_all or 'x' in printer.toolhead.homed_axes or 'X' in params %}
      G0 X175 F48000
    {% endif %}
    {% if 'y' in printer.toolhead.homed_axes %}
      G0 Y175 F48000
    {% endif %}
    _HOME_Y
  {% endif %}
  
  # Home Z
  {% if home_all or 'Z' in params %}
    {% if home_all or ('x' in printer.toolhead.homed_axes and 'y' in printer.toolhead.homed_axes) %}
      G0 X175 Y175 F48000
      TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=150 # Don't touch bed above 150C
      CARTOGRAPHER_TOUCH_HOME
      G0 Z10 F600
    {% else %}
      {action_raise_error("X and Y must be homed before homing Z!")}
    {% endif %}
  {% endif %}
  RESTORE_GCODE_STATE NAME=homing_override_state
  # SET_VELOCITY_LIMIT ACCEL={printer.configfile.settings.printer.max_accel}
  
[adxl345]
cs_pin: cartographer:PA3
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
    175, 175, 20


#####################################################################
#   UI & Peripherals
#####################################################################
[display]
# mini12864 LCD Display
lcd_type: uc1701
cs_pin: EXP1_3
a0_pin: EXP1_4
rst_pin: EXP1_5
encoder_pins: ^EXP2_5, ^EXP2_3
click_pin: ^!EXP1_2
contrast: 63
spi_software_miso_pin: EXP2_1
spi_software_mosi_pin: EXP2_6
spi_software_sclk_pin: EXP2_2


[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE7, EXP1_2=PG1,
    EXP1_3=PG0, EXP1_4=PF15,
    EXP1_5=PF14, EXP1_6=PF13,    # Slot in the socket on this side
    EXP1_7=PF12, EXP1_8=PF11,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PE13, EXP2_2=PE12,
    EXP2_3=PE15, EXP2_4=PE11,
    EXP2_5=PE10, EXP2_6=PE14,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>
##------------------------------------------------------------------------

#####################################################################
#   Software Configuration
#####################################################################
[idle_timeout]
timeout: 10800 # timeout in seconds (60/minute. 3600/hour)

# Enable object exclusion
[exclude_object]

# Enable arcs support
[gcode_arcs]
resolution: 0.3


#####################################################################
#   Macros
#####################################################################
[gcode_macro GLOBALS]
description: Define globals
variable_center_x: 175        
variable_center_y: 175
variable_center_z: 175
variable_park_x: 175        
variable_park_y: 350
variable_z_close: 10
variable_shutdown_pause_temp: 65
variable_printer_is_ready: 0
variable_purge_y: -4
# Filament Variables for Orbiter 2.5
variable_load_distance: 45          
variable_load_speed: 1200           
variable_nozzle_purge_length: 60    
variable_nozzle_purge_speed: 400    
variable_unload_distance: 70        
variable_unload_speed: 1500
variable_travel_speed: 48000
gcode:
    # NoOp

[gcode_macro M191]
gcode:
    {% set target = params.S|default(params.R|default(0))|float %}
    
    {% if target > 0 %}
        TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target}
    {% endif %}
    
[gcode_macro LOAD_FILAMENT]
description: Smart Load with Temperature Selection
gcode:
    {% set p = printer["gcode_macro GLOBALS"] %}
    
    {% if printer.extruder.temperature < 200 %}
        M117 Temp too low!
        RESPOND TYPE=error MSG="Temperature too low. Select Temperature:"
        RESPOND TYPE=command MSG="action:prompt_begin Temperature Selection"
        RESPOND TYPE=command MSG="action:prompt_text Choose your filament temperature:"
        RESPOND TYPE=command MSG="action:prompt_button 230C (PLA/PETG)|M109 S230; _FINISH_LOAD|primary"
        RESPOND TYPE=command MSG="action:prompt_button 260C (ABS/Nylon)|M109 S260; _FINISH_LOAD|secondary"
        RESPOND TYPE=command MSG="action:prompt_button 290C (PC/Nylon)|M109 S290; _FINISH_LOAD|warning"
        RESPOND TYPE=command MSG="action:prompt_show"
        # We don't stop the macro here because M109 in the buttons will handle the wait.
        # However, to prevent the load from firing BEFORE the click, we use a check:
        {action_raise_error("Temperature too low. Please select a temperature in the popup.")}
    {% else %}
        _FINISH_LOAD
    {% endif %}

[gcode_macro _FINISH_LOAD]
# This internal macro performs the actual physical movement
gcode:
    {% set p = printer["gcode_macro GLOBALS"] %}
    SAVE_GCODE_STATE NAME=load_state
    M117 Loading Filament...
    M83                            # Relative extrusion
    G92 E0
    
    M118 O2S: Fast loading...
    G1 E{p.load_distance} F{p.load_speed}
    
    M118 O2S: Purging...
    G1 E{p.nozzle_purge_length} F{p.nozzle_purge_speed}
    
    M400
    
    {% if printer["filament_switch_sensor runout_sensor"].filament_detected %}
        M118 O2S: Load Successful!
        M117 Load Complete
    {% else %}
        {action_raise_error("runout_sensor: Filament not detected after load!")}
    {% endif %}
    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
description: Smart Unload with Temperature Selection
gcode:
    {% set p = printer["gcode_macro GLOBALS"] %}
    
    {% if printer.extruder.temperature < 200 %}
        M117 Temp too low!
        RESPOND TYPE=error MSG="Temperature too low for unload. Select Temperature:"
        RESPOND TYPE=command MSG="action:prompt_begin Temperature Selection (Unload)"
        RESPOND TYPE=command MSG="action:prompt_text Choose your filament temperature to melt the tip:"
        RESPOND TYPE=command MSG="action:prompt_button 230C (PLA/PETG)|M109 S230; _FINISH_UNLOAD|primary"
        RESPOND TYPE=command MSG="action:prompt_button 260C (ABS/Nylon)|M109 S260; _FINISH_UNLOAD|secondary"
        RESPOND TYPE=command MSG="action:prompt_button 290C (PC/Nylon)|M109 S290; _FINISH_UNLOAD|warning"
        RESPOND TYPE=command MSG="action:prompt_show"
        {action_raise_error("Temperature too low. Please select a temperature in the popup.")}
    {% else %}
        _FINISH_UNLOAD
    {% endif %}

[gcode_macro _FINISH_UNLOAD]
# This internal macro performs the actual physical extraction
gcode:
    {% set p = printer["gcode_macro GLOBALS"] %}
    SAVE_GCODE_STATE NAME=unload_state
    M117 Unloading Filament...
    M83                            # Relative extrusion
    G92 E0
    
    # 1. Tip Shaping: Push slightly then fast retract
    M118 O2S: Shaping tip...
    G1 E5 F600                     # Push a bit to clear blob
    G1 E-20 F2400                  # Fast yank completely out of the melt zone
    G4 P2000                       # Let tip solidify for 2 seconds in the cold zone
    
    # 2. Complete extraction
    M118 O2S: Extracting...
    G1 E-{p.unload_distance} F{p.unload_speed}
    
    M400
    M118 O2S: Unload Complete!
    M117 Unload Complete
    RESTORE_GCODE_STATE NAME=unload_state

[gcode_macro CHANGE]
description: Alias for M600 Filament Change
gcode:
    M600

[gcode_macro M600]
description: Filament Change
gcode:
    {% set p = printer["gcode_macro GLOBALS"] %}
    
    # 1. Park the toolhead safely
    {% if printer.print_stats.state == "printing" %}
        # If mid-print, use PAUSE to save print state and park at the front
        PAUSE X={p.center_x} Y=10 Z_MIN=50
    {% else %}
        # If idle, just home (if needed) and move to the front
        {% if "xyz" not in printer.toolhead.homed_axes %} G28 {% endif %}
        G90
        G0 X{p.center_x} Y=10 Z50 F{p.travel_speed}
    {% endif %}
    
    # 2. Unload the filament
    # This leverages your smart macro. If hot, it unloads immediately.
    # If cold, it safely aborts the yank and pops up your temp selection UI.
    UNLOAD_FILAMENT
    
    # 3. Notify user
    M117 Load new filament and RESUME
    

[gcode_macro CALIBRATE_ESTEPS]
description: Heat to 230C and extrude 100mm of filament for E-step calibration
gcode:
    {% set TEMP = params.TEMP|default(220)|int %}
    
    # 1. Prepare for test
    M117 Heating to {TEMP}C...
    M109 S{TEMP}                ; Wait for nozzle temp
    
    # 2. Reset and Move
    M117 Extruding 100mm...
    M83                         ; Relative extrusion mode
    G92 E0                      ; Reset E position
    G1 E100 F60                 ; Extrude 100mm slowly (60mm/min)
    
    # 3. Finish
    M400                        ; Wait for move to finish
    M117 Measurement Ready
    RESPOND MSG="Extrusion complete. Measure remaining filament and adjust rotation_distance."
    
[gcode_shell_command plot_graph]
command: bash -c "python3 /home/pi/klipper/scripts/calibrate_shaper.py /tmp/calibration_data_$0_*.csv -o /home/pi/printer_data/config/shaper_calibrate_$0.png"
timeout: 60.0
verbose: True

[gcode_macro GENERATE_SHAPER_GRAPHS]
gcode:
    RUN_SHELL_COMMAND CMD=plot_graph PARAMS=x
    RUN_SHELL_COMMAND CMD=plot_graph PARAMS=y
    
[gcode_macro CALIBRATE_INPUT_SHAPER]
description: Conducts Input Shaper resonance tests and generates graphs.
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %} G28 {% endif %}
    G90
    G1 X175 Y175 Z20 F12000
    SET_DISPLAY_TEXT MSG="Resonance testing X..."
    SHAPER_CALIBRATE AXIS=X
    SET_DISPLAY_TEXT MSG="Resonance testing Y..."
    SHAPER_CALIBRATE AXIS=Y
    SET_DISPLAY_TEXT MSG="Generating Graphs..."
    GENERATE_SHAPER_GRAPHS
    G4 P5000 # Pause as a stupid kluge in case non-blocking GENERATE_SHAPER_GRAPHS isn't done.
    SET_DISPLAY_TEXT MSG="Saving and Restarting now..."
    SAVE_CONFIG
    
[gcode_macro PERFORMANCE_TEST]
description: Tests speed or acceleration limits
gcode:

    {% set p = printer["gcode_macro GLOBALS"] %}
    {% set mode = params.MODE|default("ACCEL")|upper %}
    {% set speed = params.SPEED|default(600)|int %}
    {% set accel = params.ACCEL|default(3500)|int %}
    {% set increment = params.INCREMENT|default(500 if mode == "ACCEL" else 50)|int %}
    
    {% if "xyz" not in printer.toolhead.homed_axes %} G28 {% endif %}
    SET_VELOCITY_LIMIT ACCEL={accel}
    SET_DISPLAY_TEXT MSG="Testing {mode}: {accel if mode == "ACCEL" else speed}"
    G90
    G1 X175 Y175 Z20 F{speed * 60}

    {% if mode == "ACCEL" %}
        # 200mm Square centered on Nozzle (175, 175)
        {% set x_min, x_max = 75, 275 %}
        {% set y_min, y_max = 75, 275 %}
        G0 X{x_min} Y{y_min} Z10 F24000
        # Triangle 1
        G1 X{x_max} Y{y_min} F{speed * 60}
        G1 X{x_max} Y{y_max} F{speed * 60}
        G1 X{x_min} Y{y_min} F{speed * 60}
        # Triangle 2
        G1 X{x_min} Y{y_max} F{speed * 60}
        G1 X{x_max} Y{y_max} F{speed * 60}
        G1 X{x_min} Y{y_min} F{speed * 60}
    {% else %}
        # 284mm Square for Speed
        {% set x_min, x_max = 33, 317 %}
        {% set y_min, y_max = 33, 317 %}
        G0 X{x_min} Y{y_min} Z10 F{p.travel_speed}
        G1 X{x_max} Y{y_min} F{speed * 60}
        G1 X{x_max} Y{y_max} F{speed * 60}
        G1 X{x_min} Y{y_max} F{speed * 60}
        G1 X{x_min} Y{y_min} F{speed * 60}
        G1 X{x_max} Y{y_max} F{speed * 60}
        G1 X{x_min} Y{y_min} F{speed * 60}
        G1 X{x_max} Y{y_min} F{speed * 60}
        G1 X{x_min} Y{y_max} F{speed * 60}
    {% endif %}

    G0 X175 Y175 Z1 F{speed * 60}
    VALIDATE_AND_CONTINUE MODE={mode} SPEED={speed} ACCEL={accel} INCREMENT={increment}

[gcode_macro VALIDATE_AND_CONTINUE]
gcode:
    {% set mode = params.MODE %}
    {% set speed = params.SPEED|int %}
    {% set accel = params.ACCEL|int %}
    {% set increment = params.INCREMENT|int %}
    {% set val = accel if mode == "ACCEL" else speed %}
    {% set next_val = val + increment %}
    
    # Calculate next step params
    {% set next_accel = next_val if mode == "ACCEL" else accel %}
    {% set next_speed = next_val if mode == "SPEED" else speed %}

    RESPOND TYPE=command MSG="action:prompt_begin Next Test Parameter?"
    RESPOND TYPE=command MSG="action:prompt_text Current {mode} {val} finished. Inspect nozzle at (175,175)."
    
    RESPOND TYPE=command MSG="action:prompt_button {next_val}|PERFORMANCE_TEST MODE={mode} SPEED={next_speed} ACCEL={next_accel} INCREMENT={increment}|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button {val}|PERFORMANCE_TEST MODE={mode} SPEED={speed} ACCEL={accel} INCREMENT={increment}|secondary"
    RESPOND TYPE=command MSG="action:prompt_button EXIT|QUIT_PERFORMANCE_TEST|error"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro QUIT_PERFORMANCE_TEST]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    SET_DISPLAY_TEXT MSG="Testing complete."
    
[gcode_macro HOMETEST]
description: Test sensorless homing for X or Y with adjustable sensitivity and current.
gcode:
    {% set p = printer["gcode_macro GLOBALS"] %}
    {% set orig_x_cur = printer.configfile.settings['tmc2209 stepper_x'].run_current %}
    {% set orig_y_cur = printer.configfile.settings['tmc2209 stepper_y'].run_current %}
    {% set orig_sg_x = printer.configfile.settings['tmc2209 stepper_x'].driver_sgthrs %}
    {% set orig_sg_y = printer.configfile.settings['tmc2209 stepper_y'].driver_sgthrs %}

    # 2. Capture Parameters with Defaults
    {% set axis = params.AXIS|default('X')|upper %}
    {% set sensitivity = params.SG|default(150)|int %}
    {% set home_cur = params.CURRENT|default(0.700)|float %}

    # 3. Validation Logic
    {% if axis not in ['X', 'Y'] %}
        { action_raise_error("Invalid AXIS. Use AXIS=X or AXIS=Y") }
    {% elif sensitivity < 10 or sensitivity > 255 %}
        { action_raise_error("Invalid SG. Use a value between 10 and 255") }
    {% elif home_cur < 0.1 or home_cur > 1.2 %}
        { action_raise_error("Invalid CURRENT. Keep between 0.1 and 1.2A") }
    {% endif %}

    # 4. Apply Test Settings
    M117 Testing {axis}: SG={sensitivity} Cur={home_cur}A
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={home_cur}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={home_cur}
    SET_TMC_FIELD STEPPER=stepper_{axis|lower} FIELD=SGTHRS VALUE={sensitivity}

    # 5. Homing Sequence
    G4 P2000                    # Settle time for StallGuard
    G28 {axis}0                 # Home the specified axis
    
    # 6. Cleanup Move
    G91                         # Relative
    {% if axis == 'X' %}
        G1 X-20 F{p.travel_speed}
    {% else %}
        G1 Y-20 F{p.travel_speed}
    {% endif %}
    G90                         # Absolute
    
    # 7. Restore Original Settings & Shutdown
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={orig_x_cur}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={orig_y_cur}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=SGTHRS VALUE={orig_sg_x}
    SET_TMC_FIELD STEPPER=stepper_y FIELD=SGTHRS VALUE={orig_sg_y}
    
    M84                         # Motors Off
    M117 Test Complete: {axis} Restored.

[gcode_macro SET_DISPLAY_TEXT]
